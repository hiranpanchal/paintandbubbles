<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us — Paint &amp; Bubbles</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <img src="/logo.png" alt="Paint &amp; Bubbles" class="logo-img"
           onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
      <span class="logo-text" id="logo-fallback" style="display:none">Paint <span class="logo-and">&amp;</span> Bubbles</span>
    </a>
    <nav class="main-nav">
      <button class="nav-btn" onclick="window.location.href='/'">Home</button>
      <button class="nav-btn" onclick="window.location.href='/events'">Events</button>
      <button class="nav-btn active" onclick="window.location.href='/about'">About</button>
      <button class="nav-btn" onclick="window.location.href='/faq'">FAQ</button>
    </nav>
    <a href="/admin" class="btn btn-ghost btn-sm">Admin</a>
  </div>
</header>

<!-- PAGE HERO -->
<section class="faq-hero">
  <div class="container">
    <h1 class="faq-hero-title" id="aboutpage-hero-title">About Us</h1>
    <p class="faq-hero-sub" id="aboutpage-hero-sub">The story behind Paint &amp; Bubbles</p>
  </div>
</section>

<!-- ABOUT CONTENT -->
<section class="about-section">
  <div class="container">
    <div class="about-inner">
      <div class="about-text">
        <p class="about-label" id="aboutpage-label">Our Story</p>
        <h2 class="about-title" id="aboutpage-title">Where creativity meets good company</h2>
        <div id="aboutpage-body"></div>
        <div class="about-pillars" id="aboutpage-pillars"></div>
      </div>
      <div class="about-image">
        <div class="about-image-inner" id="aboutpage-image-wrap">
          <img id="aboutpage-img" src="" alt="About Paint and Bubbles" style="display:none"
               onerror="this.parentElement.classList.add('about-image-placeholder')">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- REVIEWS -->
<section class="reviews-section" id="reviews-section" style="display:none">
  <div class="container reviews-section-inner">
    <div class="reviews-header">
      <h2 class="reviews-section-title">What our guests say</h2>
      <div class="reviews-stars-summary">
        <span class="reviews-stars-big">★★★★★</span>
        <span class="reviews-score">5.0</span>
      </div>
    </div>
    <div class="reviews-track-wrap">
      <div class="reviews-track" id="reviews-track"></div>
    </div>
  </div>
</section>

<!-- SOCIAL MEDIA -->
<section class="social-section" id="social-section" style="display:none">
  <div class="container social-section-inner">
    <h2 class="social-section-title" id="social-section-title">Social Media</h2>
    <div class="social-links-row" id="social-links-row"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">Paint &amp; Bubbles</div>
    <p class="footer-tagline">Creative events for everyone</p>
  </div>
</footer>

<script src="/js/about.js"></script>
</body>
</html>
