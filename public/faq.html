<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — Paint &amp; Bubbles</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <img src="/logo.png" alt="Paint &amp; Bubbles" class="logo-img"
           onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
      <span class="logo-text" id="logo-fallback" style="display:none">Paint <span class="logo-and">&amp;</span> Bubbles</span>
    </a>
    <nav class="main-nav" id="main-nav">
      <button class="nav-btn" onclick="window.location.href='/'">Home</button>
      <button class="nav-btn" onclick="window.location.href='/about'">About</button>
      <button class="nav-btn" onclick="window.location.href='/events'">Events</button>
      <button class="nav-btn" onclick="window.location.href='/reviews'">Reviews</button>
      <button class="nav-btn active" onclick="window.location.href='/faq'">FAQ</button>
      <button class="nav-btn" onclick="window.location.href='/gallery'">Gallery</button>
      <button class="nav-btn" onclick="window.location.href='/private-events'">Private Events</button>
      <a href="/contact" class="btn btn-ghost btn-sm">Contact Us</a>
    </nav>
    <button class="nav-burger" onclick="toggleMobileNav()" aria-label="Open menu">
      <svg class="burger-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg class="burger-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
    </button>
  </div>
</header>
<script>
function toggleMobileNav(){document.querySelector('.site-header').classList.toggle('nav-open');}
document.addEventListener('click',function(e){if(!e.target.closest('.site-header'))document.querySelector('.site-header').classList.remove('nav-open');});
</script>

<!-- PAGE HERO -->
<section class="faq-hero">
  <div class="container">
    <h1 class="faq-hero-title">Frequently Asked Questions</h1>
    <p class="faq-hero-sub">Everything you need to know before you book</p>
  </div>
</section>

<!-- FAQ LIST -->
<section class="faq-section">
  <div class="container">
    <div class="faq-list" id="faq-list">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading…</p>
      </div>
    </div>
  </div>
</section>

<!-- REVIEWS -->
<section class="reviews-section" id="reviews-section" style="display:none">
  <div class="container reviews-section-inner">
    <div class="reviews-header">
      <h2 class="reviews-section-title">What our guests say</h2>
      <div class="reviews-stars-summary">
        <span class="reviews-stars-big">★★★★★</span>
        <span class="reviews-score">5.0</span>
      </div>
    </div>
    <div class="reviews-track-wrap">
      <div class="reviews-track" id="reviews-track"></div>
    </div>
    <div class="reviews-cta">
      <a href="/reviews" class="btn btn-primary">See All Reviews</a>
    </div>
  </div>
</section>

<!-- SOCIAL MEDIA -->
<section class="social-section" id="social-section" style="display:none">
  <div class="container social-section-inner">
    <h2 class="social-section-title" id="social-section-title">Social Media</h2>
    <div class="social-links-row" id="social-links-row"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">Paint &amp; Bubbles</div>
    <p class="footer-tagline">Creative events for everyone</p>
    <div class="footer-cards">
      <span class="card-badge visa">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#1A1F71"/><text x="7" y="21" font-family="Arial,sans-serif" font-size="13" font-weight="bold" font-style="italic" fill="white" letter-spacing="1">VISA</text></svg>
      </span>
      <span class="card-badge mastercard">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#fff"/><circle cx="19" cy="15" r="8" fill="#EB001B"/><circle cx="29" cy="15" r="8" fill="#F79E1B"/><path d="M24 8.53a8 8 0 010 12.94A8 8 0 0124 8.53z" fill="#FF5F00"/></svg>
      </span>
      <span class="card-badge amex">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#2E77BC"/><text x="5" y="20" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" letter-spacing="0.5">AMERICAN</text><text x="5" y="29" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" letter-spacing="0.5">EXPRESS</text></svg>
      </span>
      <span class="card-badge maestro">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#fff" stroke="#e0d8dc" stroke-width="1"/><circle cx="19" cy="15" r="8" fill="#003473"/><circle cx="29" cy="15" r="8" fill="#CC0000" fill-opacity="0.85"/><path d="M24 8.53a8 8 0 010 12.94A8 8 0 0124 8.53z" fill="#6600CC" fill-opacity="0.7"/></svg>
      </span>
    </div>
  </div>
</footer>

<script src="/js/faq.js"></script>
</body>
</html>
