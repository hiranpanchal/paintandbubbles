<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event — Paint &amp; Bubbles</title>
  <link rel="stylesheet" href="/api/design/vars.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <img src="/logo.png" alt="Paint &amp; Bubbles" class="logo-img"
           onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
      <span class="logo-text" id="logo-fallback" style="display:none">Paint <span class="logo-and">&amp;</span> Bubbles</span>
    </a>
    <nav class="main-nav" id="main-nav">
      <button class="nav-btn" onclick="window.location.href='/'">Home</button>
      <button class="nav-btn" onclick="window.location.href='/about'">About</button>
      <button class="nav-btn active" onclick="window.location.href='/events'">Events</button>
      <button class="nav-btn" onclick="window.location.href='/reviews'">Reviews</button>
      <button class="nav-btn" onclick="window.location.href='/faq'">FAQ</button>
      <button class="nav-btn" onclick="window.location.href='/gallery'">Gallery</button>
      <button class="nav-btn" onclick="window.location.href='/gift-vouchers'">Gift Vouchers</button>
      <button class="nav-btn" onclick="window.location.href='/private-events'">Private Events</button>
      <a href="/contact" class="btn btn-ghost btn-sm">Contact Us</a>
    </nav>
    <button class="nav-burger" onclick="toggleMobileNav()" aria-label="Open menu">
      <svg class="burger-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg class="burger-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
    </button>
  </div>
</header>
<script>
function toggleMobileNav(){document.querySelector('.site-header').classList.toggle('nav-open');}
document.addEventListener('click',function(e){if(!e.target.closest('.site-header'))document.querySelector('.site-header').classList.remove('nav-open');});
</script>

<!-- MAIN CONTENT (rendered by JS) -->
<div id="event-detail-root">
  <div class="ed-loading">
    <div class="spinner"></div>
    <p>Loading event…</p>
  </div>
</div>

<!-- REVIEWS -->
<section class="reviews-section" id="reviews-section" style="display:none">
  <div class="container reviews-section-inner">
    <div class="reviews-header">
      <h2 class="reviews-section-title">What our guests say</h2>
      <div class="reviews-stars-summary">
        <span class="reviews-stars-big">★★★★★</span>
        <span class="reviews-score">5.0</span>
      </div>
    </div>
    <div class="reviews-track-wrap">
      <div class="reviews-track" id="reviews-track"></div>
    </div>
    <div class="reviews-cta">
      <a href="/reviews" class="btn btn-primary">See All Reviews</a>
    </div>
  </div>
</section>

<!-- SOCIAL MEDIA -->
<section class="social-section" id="social-section" style="display:none">
  <div class="container social-section-inner">
    <h2 class="social-section-title" id="social-section-title">Social Media</h2>
    <div class="social-links-row" id="social-links-row"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">Paint &amp; Bubbles</div>
    <p class="footer-tagline">Creative events for everyone</p>
    <div class="footer-cards">
      <span class="card-badge visa">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#1A1F71"/><text x="24" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" font-style="italic" fill="white" letter-spacing="1">VISA</text></svg>
      </span>
      <span class="card-badge mastercard">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#fff"/><circle cx="19" cy="13" r="7" fill="#EB001B"/><circle cx="29" cy="13" r="7" fill="#F79E1B"/><path d="M24 7a7 7 0 010 12A7 7 0 0124 7z" fill="#FF5F00"/><text x="24" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#333" letter-spacing="0.3">CREDIT</text></svg>
      </span>
      <span class="card-badge mastercard-debit">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#fff"/><circle cx="19" cy="13" r="7" fill="#EB001B"/><circle cx="29" cy="13" r="7" fill="#F79E1B"/><path d="M24 7a7 7 0 010 12A7 7 0 0124 7z" fill="#FF5F00"/><text x="24" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#333" letter-spacing="0.3">DEBIT</text></svg>
      </span>
      <span class="card-badge amex">
        <svg viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="30" rx="4" fill="#2E77BC"/><text x="24" y="19" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" letter-spacing="0.5">AMEX</text></svg>
      </span>
    </div>
  </div>
</footer>

<!-- BOOKING MODAL -->
<div class="modal-overlay hidden" id="booking-modal" onclick="closeBookingModal(event)">
  <div class="modal modal-lg" id="booking-modal-content">
    <button class="modal-close" onclick="closeModal('booking-modal')">✕</button>
    <div id="booking-modal-body"></div>
  </div>
</div>

<!-- CONFIRMATION MODAL -->
<div class="modal-overlay hidden" id="confirm-modal">
  <div class="modal" id="confirm-modal-content">
    <div id="confirm-modal-body"></div>
  </div>
</div>

<script src="/js/event-detail.js"></script>
</body>
</html>
