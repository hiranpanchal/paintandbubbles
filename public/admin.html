<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Paint &amp; Bubbles</title>
  <link rel="stylesheet" href="/css/admin.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="/logo.png" alt="Paint &amp; Bubbles" class="login-logo-img"
           onerror="this.style.display='none';document.getElementById('login-logo-text').style.display='block'">
      <div>
        <div class="login-logo-text" id="login-logo-text" style="display:none">Paint &amp; Bubbles</div>
        <div class="login-logo-sub">Admin Dashboard</div>
      </div>
    </div>
    <h2 class="login-title">Welcome back</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo">
        <img src="/logo.png" alt="Paint &amp; Bubbles" class="sidebar-logo-img"
             onerror="this.style.display='none';document.getElementById('sidebar-logo-text').style.display='block'">
        <span class="sidebar-logo-text" id="sidebar-logo-text" style="display:none">Paint &amp; Bubbles</span>
      </a>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>

    <nav class="sidebar-nav">
      <button class="sidebar-item active" id="tab-overview" onclick="switchTab('overview')">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Overview
      </button>
      <button class="sidebar-item" id="tab-events" onclick="switchTab('events')">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 8h14M7 4v2M13 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Events
      </button>
      <button class="sidebar-item" id="tab-bookings" onclick="switchTab('bookings')">
        <svg viewBox="0 0 20 20" fill="none"><path d="M4 4h12a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M7 9h6M7 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Bookings
      </button>
      <button class="sidebar-item" id="tab-customers" onclick="switchTab('customers')">
        <svg viewBox="0 0 20 20" fill="none"><path d="M13 7a3 3 0 11-6 0 3 3 0 016 0zM4 17a8 8 0 0112 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Customers
      </button>
      <button class="sidebar-item" id="tab-payments" onclick="switchTab('payments')">
        <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 9h16" stroke="currentColor" stroke-width="1.5"/></svg>
        Payments
      </button>
      <button class="sidebar-item" id="tab-design" onclick="switchTab('design')">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 3c1.5 2 3 3.5 3 5.5a3 3 0 01-6 0C7 6.5 8.5 5 10 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 13.5c1-.5 2-.5 3 0s2 .5 3 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Design
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-signout" onclick="signOut()">
        <svg viewBox="0 0 20 20" fill="none"><path d="M7 3H4a1 1 0 00-1 1v12a1 1 0 001 1h3M13 7l4 3-4 3M7 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Top Bar -->
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <h1 class="page-title" id="page-title">Overview</h1>
      <div class="topbar-right">
        <a href="/" target="_blank" class="btn btn-ghost btn-sm">View Site ↗</a>
      </div>
    </div>

    <!-- OVERVIEW TAB -->
    <div class="tab-content" id="content-overview">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card loading"><div class="spinner"></div></div>
        <div class="stat-card loading"><div class="spinner"></div></div>
        <div class="stat-card loading"><div class="spinner"></div></div>
        <div class="stat-card loading"><div class="spinner"></div></div>
      </div>
      <div class="content-row">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Recent Bookings</h3>
          </div>
          <div id="recent-bookings-table"></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Revenue (Last 12 Months)</h3>
          </div>
          <div id="revenue-chart" class="chart-container"></div>
        </div>
      </div>
    </div>

    <!-- EVENTS TAB -->
    <div class="tab-content hidden" id="content-events">
      <div class="toolbar">
        <div></div>
        <button class="btn btn-primary btn-sm" onclick="openEventForm()">+ Add Event</button>
      </div>
      <div class="card">
        <div id="events-table"></div>
      </div>
    </div>

    <!-- BOOKINGS TAB -->
    <div class="tab-content hidden" id="content-bookings">
      <div class="toolbar">
        <div class="filter-row">
          <select id="bookings-status-filter" onchange="loadAdminBookings()">
            <option value="">All statuses</option>
            <option value="confirmed">Confirmed</option>
            <option value="pending">Pending</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="card">
        <div id="bookings-table"></div>
      </div>
    </div>

    <!-- CUSTOMERS TAB -->
    <div class="tab-content hidden" id="content-customers">
      <div class="toolbar">
        <div class="search-field-admin">
          <input type="text" id="customers-search" placeholder="Search customers…" oninput="debouncedCustomerSearch()">
        </div>
      </div>
      <div class="card">
        <div id="customers-table"></div>
      </div>
    </div>

    <!-- PAYMENTS TAB -->
    <div class="tab-content hidden" id="content-payments">
      <div class="stats-grid" id="payment-stats-grid" style="grid-template-columns:repeat(3,1fr)"></div>
      <div class="content-row">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Revenue by Event</h3></div>
          <div id="revenue-by-event"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title">Transaction History</h3></div>
          <div id="payments-table"></div>
        </div>
      </div>
    </div>

    <!-- DESIGN TAB -->
    <div class="tab-content hidden" id="content-design">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<!-- EVENT FORM MODAL -->
<div class="modal-overlay hidden" id="event-form-modal" onclick="if(event.target.id==='event-form-modal')closeAdminModal('event-form-modal')">
  <div class="modal" id="event-form-content">
    <div class="modal-header">
      <h2 id="event-form-title">Add Event</h2>
      <button class="modal-close" onclick="closeAdminModal('event-form-modal')">✕</button>
    </div>
    <div class="modal-body" id="event-form-body"></div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-overlay hidden" id="delete-modal" onclick="if(event.target.id==='delete-modal')closeAdminModal('delete-modal')">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>Delete Event?</h2>
      <button class="modal-close" onclick="closeAdminModal('delete-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-mid);margin-bottom:24px;font-weight:500;">This will remove the event from the public site. Existing bookings won't be affected.</p>
      <div style="display:flex;gap:12px;">
        <button class="btn btn-ghost btn-full" onclick="closeAdminModal('delete-modal')">Cancel</button>
        <button class="btn btn-danger btn-full" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
